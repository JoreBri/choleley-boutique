<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

        </nav>

                </div>
                <div class="producto">
                    <img class="productoImg" src="./img/gorra.png" alt="Gorras">

                <div class="producto">

                        <h3 class="productoTitulo">Tazas</h3>
                        <p class="productoPrecio">$15000</p>
                        <button class="productoBtn">Pedir Articulo</button>
